<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preferences</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Scrounge Logo" class="logo">
    <h1>Preferences</h1>
    <div class="menu">
        <p>Current: 
            {% if prefs %}
                {{ prefs | join(', ') }}
            {% else %}
                None
            {% endif %}
        </p>
        
        <h2>Add Preference</h2>
        <form method="post">
            <input type="hidden" name="action" value="add">
            <input type="text" name="cuisine" placeholder="Cuisine" required>
            <input type="submit" value="Add" class="button">
        </form>
        
        <h2>Remove Preference</h2>
        <form method="post">
            <input type="hidden" name="action" value="remove">
            <input type="text" name="cuisine" placeholder="Cuisine" required>
            <input type="submit" value="Remove" class="button">
        </form>
        
        <h2>Clear All</h2>
        <form method="post">
            <input type="hidden" name="action" value="clear">
            <input type="submit" value="Clear All" class="button">
        </form>
        <br>
        <a href="/" class="button">Back</a>
    </div>
</body>
</html>
