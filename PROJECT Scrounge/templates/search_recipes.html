<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Recipes</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Scrounge Logo" class="logo">
    <h1>Search Recipes</h1>
    <div class="menu">
        {% if is_post %}
            <h2>Search Results</h2>
            {% if meals %}
                <ul>
                    {% for meal in meals %}
                        <li>{{ loop.index }}: {{ meal.name }}</li>
                    {% endfor %}
                </ul>
            {% else %}
                <p>No meals found.</p>
            {% endif %}
            <br>
            <a href="/search_recipes" class="button">Search Again</a>
        {% else %}
            <form method="post">
                <input type="text" name="query" placeholder="Ingredient or name" required>
                <input type="submit" value="Search" class="button">
            </form>
        {% endif %}
        <br>
        <a href="/" class="button">Back</a>
    </div>
</body>
</html>
