<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ready-to-Make Meals</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Scrounge Logo" class="logo">
    <h1>Ready-to-Make Meals</h1>
    <div class="menu">
        {% if meals %}
            <ul>
                {% for meal in meals %}
                    <li>{{ meal[0] }}: {{ meal[1] }}</li>
                {% endfor %}
            </ul>
        {% else %}
            <p>No recipes ready to make with current inventory.</p>
        {% endif %}
        <br>
        <a href="/" class="button">Back</a>
    </div>
</body>
</html>
