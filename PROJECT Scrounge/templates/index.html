<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrounge</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Scrounge Logo" class="logo">
    <p>Welcome, <strong>{{ session['username'] }}</strong>! <a href="/logout" class="button small">Logout</a></p>
    <div class="menu">
        {% for option in menu_options %}
            <a href="{{ option.url }}" class="button">{{ option.text }}</a>
        {% endfor %}
    </div>
</body>
</html>
