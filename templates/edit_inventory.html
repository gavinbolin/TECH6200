<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Inventory Item</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Scrounge Logo" class="logo">
    <h1>Edit Inventory Item</h1>
    <div class="menu">
        <form method="post" action="/update_inventory">
            <input type="hidden" name="old_name" value="{{ item.name }}">
            <label for="item_name">Item Name:</label>
            <input type="text" name="item_name" value="{{ item.name }}" required>
            <label for="quantity">Quantity:</label>
            <input type="text" name="quantity" value="{{ item.quantity }}" required>
            <input type="submit" value="Update" class="button">
        </form>
        <a href="/inventory" class="button">Cancel</a>
    </div>
</body>
</html>
